<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-surface-1); padding: 24px; }
  .row { display: flex; gap: 24px; align-items: flex-start; }
  .card { background: var(--color-paper-elevated); border: 1px solid var(--color-rule);
    border-radius: var(--radius-md); padding: 16px 20px; flex: 1; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--color-accent); margin-bottom: 6px; }
  .use { font-family: var(--font-sans); font-size: 11px; color: var(--color-ink-faint); margin-top: 6px; }
</style>
</head>
<body>
<div class="row">
  <div class="card" style="box-shadow:var(--shadow-sm);">
    <div class="label">--shadow-sm</div>
    <div style="font-family:var(--font-serif);font-size:14px;color:var(--color-ink);">0 1px 2px · 4% ink</div>
    <div class="use">Cards in list, default state</div>
  </div>
  <div class="card" style="box-shadow:var(--shadow-md);">
    <div class="label">--shadow-md</div>
    <div style="font-family:var(--font-serif);font-size:14px;color:var(--color-ink);">0 4px 12px · 6% ink</div>
    <div class="use">Hovered / elevated card</div>
  </div>
  <div class="card" style="box-shadow:var(--shadow-lg);">
    <div class="label">--shadow-lg</div>
    <div style="font-family:var(--font-serif);font-size:14px;color:var(--color-ink);">0 12px 32px · 8% ink</div>
    <div class="use">Modals, video lightboxes only</div>
  </div>
</div>
</body>
</html>
