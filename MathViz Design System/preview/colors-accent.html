<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-paper); padding: 20px; }
  .row { display: flex; gap: 10px; align-items: stretch; }
  .swatch { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch-color { height: 80px; }
  .swatch-info { background: var(--color-paper-elevated); padding: 10px 12px; border-top: 1px solid var(--color-rule); }
  .swatch-name { font-family: var(--font-mono); font-size: 11px; color: var(--color-ink-muted); }
  .swatch-value { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-faint); margin-top: 2px; }
  .swatch-use { font-family: var(--font-sans); font-size: 10px; color: var(--color-ink-faint); margin-top: 4px; }
  .demo { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
  .btn { font-family: var(--font-sans); font-size: 13px; font-weight: 500; padding: 7px 16px;
    border-radius: var(--radius-md); border: none; cursor: pointer; }
  .btn-accent { background: #c8693d; color: #fff; }
  .pill { font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    background: #f4e4d3; color: #c8693d; padding: 2px 10px; border-radius: 999px; }
  .link { font-family: var(--font-sans); font-size: 13px; color: #c8693d; text-decoration: underline; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#c8693d;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-accent</div>
      <div class="swatch-value">#c8693d (light) / #e8a87c (dark)</div>
      <div class="swatch-use">CTAs, links, focus rings</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#b5582e;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-accent-hover</div>
      <div class="swatch-value">#b5582e</div>
      <div class="swatch-use">Button hover state</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#f4e4d3;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-accent-soft</div>
      <div class="swatch-value">#f4e4d3</div>
      <div class="swatch-use">Tinted bg, active nav</div>
    </div>
  </div>
</div>
<div class="demo">
  <button class="btn btn-accent">Start with Linear Algebra</button>
  <span class="pill">accent</span>
  <a class="link" href="#">Browse courses →</a>
</div>
</body>
</html>
