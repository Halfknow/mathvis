<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-paper); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch-color { height: 72px; border-bottom: 1px solid var(--color-rule); }
  .swatch-info { background: var(--color-paper-elevated); padding: 10px 12px; }
  .swatch-name { font-family: var(--font-mono); font-size: 11px; color: var(--color-ink-muted); }
  .swatch-value { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-faint); margin-top: 2px; }
  .swatch-use { font-family: var(--font-sans); font-size: 10px; color: var(--color-ink-faint); margin-top: 4px; line-height: 1.3; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch">
    <div class="swatch-color" style="background:#1a1f36;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-ink</div>
      <div class="swatch-value">#1a1f36</div>
      <div class="swatch-use">Body text, headings</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#4a5170;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-ink-muted</div>
      <div class="swatch-value">#4a5170</div>
      <div class="swatch-use">Secondary text, captions</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#8b91a7;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-ink-faint</div>
      <div class="swatch-value">#8b91a7</div>
      <div class="swatch-use">Tertiary, metadata</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#e8e3d8;"></div>
    <div class="swatch-info">
      <div class="swatch-name">--color-rule</div>
      <div class="swatch-value">#e8e3d8</div>
      <div class="swatch-use">Dividers, borders</div>
    </div>
  </div>
</div>
</body>
</html>
