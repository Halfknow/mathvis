        - 'heading "Subjective: your degree of belief" [level=3] [ref=e450]'
        - paragraph [ref=e451]: Before the die lands, how confident are you that the result will be even? That confidence — your degree of belief — is also a probability.
        - paragraph [ref=e452]:
          - text: The subjective view treats probability as a
          - emphasis [ref=e453]: quantified opinion
          - text: . Two people can have different probabilities for the same event if they have different information. A weather forecaster says “30% chance of rain” — that number encodes their belief based on all available data, not a long-run frequency of identical Tuesdays.
        - paragraph [ref=e454]: This interpretation is the foundation of Bayesian statistics, which you will encounter later in this course.
        - heading "Which interpretation is “right”?" [level=3] [ref=e455]
        - paragraph [ref=e456]: All three. They are three lenses on the same mathematical structure. The classical view is cleanest for fair games; the frequentist view dominates scientific experiments and hypothesis testing (lessons 19–20); the subjective view powers Bayesian inference (lessons 21–23). The axioms below are interpretation-agnostic — they work regardless of which lens you adopt.
