<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathViz · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; min-height: 100vh; background: var(--color-paper); color: var(--color-ink); }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
  /* Smooth theme transitions */
  *, *::before, *::after { transition: background-color var(--duration-base) var(--ease-smooth), border-color var(--duration-base) var(--ease-smooth); }
  a, button, span, p, h1, h2, h3 { transition: color var(--duration-fast) var(--ease-smooth); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56">
    <rect width="80" height="56" fill="#faf7f2"/>
    <rect x="12" y="12" width="56" height="32" rx="4" fill="#f4f0e8" stroke="#e8e3d8" stroke-width="1"/>
    <text x="40" y="34" font-family="Georgia,serif" font-size="20" font-weight="600" fill="#1a1f36" text-anchor="middle">∫</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="CoursePage.jsx"></script>
<script type="text/babel" src="LessonPage.jsx"></script>
<script type="text/babel" src="CataloguePage.jsx"></script>
<script type="text/babel" src="SearchPage.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('mv-page') || 'home');
  const [theme, setTheme] = useState(() => localStorage.getItem('mv-theme') || 'light');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('mv-theme', theme);
  }, [theme]);

  useEffect(() => {
    localStorage.setItem('mv-page', page);
    window.scrollTo({ top: 0 });
  }, [page]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  return (
    <div id="root" style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Header currentPage={page} onNav={setPage} theme={theme} onThemeToggle={toggleTheme} />
      {page === 'home'      && <HomePage onNav={setPage} />}
      {page === 'catalogue' && <CataloguePage onNav={setPage} />}
      {page === 'search'    && <SearchPage onNav={setPage} />}
      {page === 'course'    && <CoursePage onNav={setPage} />}
      {page === 'lesson'    && <LessonPage onNav={setPage} />}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
