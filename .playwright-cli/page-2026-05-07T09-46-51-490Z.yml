        - heading "Vectors as Arrows" [level=1] [ref=e188]
        - paragraph [ref=e189]:
          - text: Before a vector is a list of numbers, it is an
          - strong [ref=e190]: arrow
          - text: — pointing from somewhere, in some direction, with some length. Almost every theorem you’ll meet later has a geometric shadow you can see, if you train yourself to look for it. This lesson is about training that eye.
        - generic [ref=e191]:
          - paragraph [ref=e192]: Before you start
          - list [ref=e193]:
            - listitem [ref=e194]:
              - img [ref=e196]
              - link "Coordinate plane basics" [ref=e198] [cursor=pointer]:
                - /url: /courses/precalc/coordinate-plane
        - heading "What an arrow knows" [level=2] [ref=e199]
        - paragraph [ref=e200]:
          - text: "An arrow on the page captures two pieces of information at once: a"
          - strong [ref=e201]: direction
          - text: and a
          - strong [ref=e202]: magnitude
          - text: . That’s it. It does not remember where its tail starts — and this freedom is what gives vectors their power.
        - figure "FigureThree arrows of the same vector, drawn from different starting points." [ref=e203]:
          - generic [ref=e206]: FigureThree arrows of the same vector, drawn from different starting points.
        - heading "The zero vector" [level=3] [ref=e207]
        - paragraph [ref=e208]:
          - text: There is one arrow that breaks the rule. The
          - strong [ref=e209]: zero vector
          - text: has no direction at all — its tip and tail are the same point. It is the only vector that cannot point somewhere, because “somewhere” requires a direction, and the zero vector has none.
        - paragraph [ref=e210]: "This might seem like a technicality, but the zero vector is the additive identity of the vector space: adding it to any vector leaves that vector unchanged, just as adding zero to a number does nothing. It is the “do nothing” displacement — you walk zero steps in zero directions and end up exactly where you started."
