        - paragraph [ref=e624]: These four rules are surprisingly powerful. From them you can derive everything from Bayes’ theorem to the law of large numbers. They are the grammar of the language of chance.
        - heading "A measure-theoretic aside" [level=3] [ref=e625]
        - paragraph [ref=e626]:
          - text: The rigorous mathematical foundation of probability (Kolmogorov, 1933) defines probability as a
          - strong [ref=e627]: measure
          - text: — a function that assigns “sizes” to subsets of a sample space, subject to exactly the four axioms above. The collection of subsets that can be measured is called a
          - strong [ref=e628]: σ-algebra
          - text: — think of it as “the set of all events you are allowed to ask about.” This formality matters when the sample space is uncountable (like all real numbers), where naïve “area” reasoning can produce paradoxes. We will not need measure theory in this course, but it lurks beneath every formula — ensuring that “probability” is always well-defined.
        - generic [ref=e629]:
