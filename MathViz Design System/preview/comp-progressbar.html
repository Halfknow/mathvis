<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-paper); padding: 20px 24px; }
  .item { margin-bottom: 16px; }
  .meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .meta-label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--color-ink); }
  .meta-pct { font-family: var(--font-mono); font-size: 11px; color: var(--color-ink-muted); }
  .track { height: 6px; border-radius: 999px; background: var(--color-surface-2); overflow: hidden; }
  .fill { height: 100%; border-radius: 999px; background: var(--color-accent);
    transition: width var(--duration-base) var(--ease-smooth); }
</style>
</head>
<body>
  <div class="item">
    <div class="meta"><span class="meta-label">Linear Algebra</span><span class="meta-pct">35%</span></div>
    <div class="track"><div class="fill" style="width:35%;"></div></div>
  </div>
  <div class="item">
    <div class="meta"><span class="meta-label">Calculus</span><span class="meta-pct">0%</span></div>
    <div class="track"><div class="fill" style="width:0%;"></div></div>
  </div>
  <div class="item">
    <div class="meta"><span class="meta-label">Probability</span><span class="meta-pct">100%</span></div>
    <div class="track"><div class="fill" style="width:100%;"></div></div>
  </div>
</body>
</html>
