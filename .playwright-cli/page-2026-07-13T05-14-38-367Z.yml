        - paragraph [ref=e321]: This works when every tile is equally likely. Fair coins, fair dice, well-shuffled decks — the classical view handles these cleanly. It is the oldest interpretation, dating back to the gambling problems that launched the field in the 1600s.
        - 'heading "Frequentist: rolling over and over" [level=3] [ref=e322]'
        - paragraph [ref=e323]: "Imagine rolling that die 10,000 times. You build a histogram — one bar per face. After 10 rolls, the bars are jagged and uneven. After 1,000 rolls, they start to even out. After 10,000 rolls, every bar has grown to roughly the same height: about 1,667 out of 10,000, which is close to 1/6."
