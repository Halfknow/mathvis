        - heading "Opposite vectors" [level=3] [ref=e274]
        - paragraph [ref=e275]:
          - text: For every arrow, there is an arrow pointing the exact opposite way with the same length. This is the
          - strong [ref=e276]: negative
          - text: "of the vector: -v has the same magnitude but points in the opposite direction. If v is “walk 3 east and 2 north,” then -v is “walk 3 west and 2 south.”"
        - paragraph [ref=e277]: Geometrically, negating a vector rotates it 180 degrees around its tail. The direction flips, the length stays the same. Watch what happens when you click the “Opposite” preset above — the vector pivots to face the other way.
        - heading "In three dimensions" [level=2] [ref=e278]
        - paragraph [ref=e279]: The same idea extends to 3D — a vector is still an arrow defined by direction and length, regardless of where it starts. Drag to orbit the scene below.
