<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-paper); padding: 20px 24px; }
  .rows { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .token { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-faint); width: 80px; flex-shrink: 0; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--color-accent); width: 36px; flex-shrink: 0; }
  .bar { height: 10px; background: var(--color-ink); border-radius: 2px; opacity: 0.15; }
  .bar-accent { background: var(--color-accent); opacity: 0.7; }
</style>
</head>
<body>
<div class="rows">
  <div class="row"><span class="token">--space-1</span><span class="px">4px</span><div class="bar" style="width:4px;"></div></div>
  <div class="row"><span class="token">--space-2</span><span class="px">8px</span><div class="bar" style="width:8px;"></div></div>
  <div class="row"><span class="token">--space-3</span><span class="px">12px</span><div class="bar" style="width:12px;"></div></div>
  <div class="row"><span class="token">--space-4</span><span class="px">16px</span><div class="bar bar-accent" style="width:16px;"></div></div>
  <div class="row"><span class="token">--space-6</span><span class="px">24px</span><div class="bar" style="width:24px;"></div></div>
  <div class="row"><span class="token">--space-8</span><span class="px">32px</span><div class="bar" style="width:32px;"></div></div>
  <div class="row"><span class="token">--space-12</span><span class="px">48px</span><div class="bar" style="width:48px;"></div></div>
  <div class="row"><span class="token">--space-16</span><span class="px">64px</span><div class="bar" style="width:64px;"></div></div>
  <div class="row"><span class="token">--space-24</span><span class="px">96px</span><div class="bar" style="width:96px;"></div></div>
  <div class="row"><span class="token">--space-32</span><span class="px">128px</span><div class="bar" style="width:128px;"></div></div>
</div>
</body>
</html>
