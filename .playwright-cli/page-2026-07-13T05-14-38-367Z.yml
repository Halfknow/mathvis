    - main [ref=e171]:
      - generic [ref=e172]:
        - paragraph [ref=e173]: "You hold a six-sided die in your hand. Before you roll, the outcome is uncertain — it could land on any of 1 through 6. After you roll, the outcome is fixed. Probability lives in the space between those two moments: the grey zone before the die lands, where the outcome exists only as a possibility."
        - paragraph [ref=e174]: That grey zone is what this entire course is about. Probability gives you a precise language for talking about events that have not happened yet, or that you simply do not know about. It does not predict the future — it measures the shape of uncertainty.
        - heading "The sample space as a physical place" [level=2] [ref=e175]
        - paragraph [ref=e176]: Imagine a floor tiled with six squares, each the same size, labeled 1 through 6. Rolling the die is like being blindfolded and dropped randomly onto one of these tiles. Every tile is equally likely to be the one you land on.
        - paragraph [ref=e177]:
          - text: This tiled floor is your
          - strong [ref=e178]: sample space
          - text: "— the set of all possible outcomes. For a fair die, the sample space has six equally sized tiles, so the probability of landing on any particular one is:"
