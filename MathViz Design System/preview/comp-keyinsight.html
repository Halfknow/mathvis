<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-paper); padding: 20px 32px; max-width: 680px; }
  .key-insight { border-left: 2px solid var(--color-accent); padding: 8px 0 8px 24px; margin: 0; }
  .ki-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--color-accent); margin-bottom: 8px; }
  .ki-text { font-family: var(--font-serif); font-style: italic; font-size: var(--text-h3);
    line-height: 1.35; color: var(--color-ink); margin: 0; }
</style>
</head>
<body>
  <aside class="key-insight">
    <p class="ki-label">Key insight</p>
    <p class="ki-text">A vector is the <strong>equivalence class</strong> of all arrows with the same direction and length. The coordinates we introduce later are one specific representative — convenient, but never the whole story.</p>
  </aside>
</body>
</html>
