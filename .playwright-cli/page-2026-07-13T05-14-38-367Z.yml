        - paragraph [ref=e248]: "The “P” stands for probability. The statement says: one favorable tile out of six total tiles. That fraction — one sixth — is the probability."
        - paragraph [ref=e249]: "This tile picture is the foundation. Every concept in probability can be understood as something happening on this floor: regions of tiles, overlaps between regions, parts of the floor painted different colors. Keep the floor in mind and the formulas will never feel abstract."
        - heading "Three ways to read the tiles" [level=2] [ref=e250]
        - paragraph [ref=e251]: "Probability has three major interpretations. All three produce the same numbers, but they mean different things. Here is how each one reads the die:"
