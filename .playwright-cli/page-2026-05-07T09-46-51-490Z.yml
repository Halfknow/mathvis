        - complementary [ref=e294]:
          - paragraph [ref=e295]: Key insight
          - paragraph
          - paragraph [ref=e296]:
            - text: A vector is the
            - strong [ref=e297]: equivalence class
            - text: of all arrows with the same direction and length. The zero vector is the unique arrow with no direction.
          - paragraph
        - heading "When coordinates enter" [level=2] [ref=e298]
        - paragraph [ref=e299]: "With a starting point fixed at the origin, the arrow’s tip lands at its components:"
        - paragraph [ref=e300]:
          - text: The first number tells you how far east (positive) or west (negative). The second tells you how far north (positive) or south (negative). So the vector (3, 2) points northeast — mostly east, slightly north — while (-1, 3) points northwest — slightly west, strongly north. Both are in the upper half of the plane, but their
          - emphasis [ref=e301]: character
          - text: "is completely different: one chases the horizon, the other climbs toward the sky."
