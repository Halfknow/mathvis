        - heading "Three perspectives on probability" [level=2] [ref=e636]
        - list [ref=e637]:
          - listitem [ref=e638]:
            - strong [ref=e639]: "Geometric:"
            - text: probability is the fraction of the tiled floor your event covers — area of region
            - generic [ref=e640]:
              - math [ref=e642]:
                - generic [ref=e645]: A
              - generic [ref=e647]: A
            - text: divided by total floor area.
          - listitem [ref=e648]:
            - strong [ref=e649]: "Combinatorial:"
            - text: probability is favorable outcomes divided by total outcomes — counting, when all outcomes are equally likely.
          - listitem [ref=e650]:
            - strong [ref=e651]: "Axiomatic:"
            - text: probability is any function
            - generic [ref=e652]:
              - math [ref=e654]:
                - generic [ref=e657]: P
              - generic [ref=e659]: P
            - text: satisfying the four Kolmogorov axioms — a measure of size that is non-negative, normalized, and additive.
        - paragraph [ref=e660]: All three give the same answers for simple problems. The axiomatic view is the most general — it works even when outcomes are not equally likely or when the sample space is uncountable. The geometric view builds intuition; the combinatorial view computes answers; the axiomatic view guarantees everything is well-defined.
        - complementary [ref=e661]:
          - paragraph [ref=e662]: Key insight
          - paragraph
          - paragraph [ref=e663]: "Probability does not tell you what will happen — it tells you what is likely to happen, and by how much. Think of it as measuring regions on a tiled floor: every tile is a possible outcome, and probability is the fraction of floor your event covers. Three interpretations (classical, frequentist, subjective) share one set of axioms."
          - paragraph
        - heading "Connections" [level=2] [ref=e664]
        - paragraph [ref=e665]:
          - text: This lesson establishes the
          - strong [ref=e666]: sample space
          - text: and the
          - strong [ref=e667]: four axioms
          - text: — the vocabulary and grammar that every subsequent lesson uses. The inclusion-exclusion rule (Rule 3) generalizes to the
          - strong [ref=e668]: inclusion-exclusion principle
          - text: for many events, which underlies counting arguments in
          - link "lesson 02" [ref=e669] [cursor=pointer]:
            - /url: /courses/probability/02-counting-enumeration
          - text: . The complement rule (Rule 4) is the secret weapon for computing “at least one” probabilities — it’s often easier to compute “none” and subtract from 1.
        - paragraph [ref=e670]:
          - text: The frequentist interpretation connects forward to the
          - strong [ref=e671]: law of large numbers
          - text: (lesson 15) and
          - strong [ref=e672]: central limit theorem
          - text: (lesson 16), which formalize why histograms converge. The subjective interpretation seeds the entire
          - strong [ref=e673]: Bayesian
          - text: half of the course (lessons 21–23), where probability is updated belief rather than long-run frequency. The axiomatic/measure-theoretic view is the silent foundation beneath continuous distributions (lesson 08), where the “tiled floor” becomes a smooth density curve and “area” becomes an integral.
